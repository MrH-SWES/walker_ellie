<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Integer Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root{
    --bg:#2a2a3a;
    --panel:#333348;
    --ok:#2f7f1f;
    --bad:#d90000;
    --muted:#5a5a7a;
  }

  body{
    height:100vh;
    overflow:hidden;
    background:var(--bg);
    font-family:'Fredoka',sans-serif;
    color:#fff;
    user-select:none;
  }

  .app{
    height:100%;
    display:grid;
    grid-template-columns: clamp(360px, 34vw, 460px) 1fr;
  }

  .panel{
    background:var(--panel);
    display:grid;
    grid-template-rows:auto 1fr auto;
    gap:8px;
    padding:8px;
    overflow:hidden;
    border:none;
    box-shadow:none;
  }

  .view-select{
    display:grid;
    grid-template-columns:1fr;
    gap:7px;
  }
  .view-btn{
    border:0;
    border-radius:10px;
    height:44px;
    font:700 16px 'Fredoka',sans-serif;
    color:#fff;
    background:#4a4a63;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:10px;
    padding:0 12px;
  }
  .view-btn.active{ background:#6e6ea0; }

  .center-controls{
    display:grid;
    place-items:center;
  }

  .compass{
    width:min(100%, 346px);
    display:grid;
    grid-template-columns: 106px 106px 106px;
    grid-template-rows: 106px 106px 106px;
    gap:14px;
    justify-content:center;
    align-content:center;
  }

  .arrow{
    border:0;
    color:#fff;
    font:700 34px 'Fredoka',sans-serif;
    cursor:pointer;
    display:grid;
    place-items:center;
    text-shadow:0 1px 0 #0006;
    transition:opacity .12s;
    width:106px;
    height:106px;
  }
  .arrow.pos{ background:var(--ok); }
  .arrow.neg{ background:var(--bad); }

  .arrow.up{
    grid-column:2; grid-row:1;
    clip-path:polygon(50% 0,100% 42%,72% 42%,72% 100%,28% 100%,28% 42%,0 42%);
  }
  .arrow.down{
    grid-column:2; grid-row:3;
    clip-path:polygon(28% 0,72% 0,72% 58%,100% 58%,50% 100%,0 58%,28% 58%);
  }
  .arrow.left{
    grid-column:1; grid-row:2;
    clip-path:polygon(0 50%,42% 0,42% 28%,100% 28%,100% 72%,42% 72%,42% 100%);
  }
  .arrow.right{
    grid-column:3; grid-row:2;
    clip-path:polygon(58% 0,58% 28%,0 28%,0 72%,58% 72%,58% 100%,100% 50%);
  }

  .home{
    grid-column:2; grid-row:2;
    width:106px; height:106px;
    border:0;
    border-radius:16px;
    background:#101015;
    color:#fff;
    font:700 48px 'Fredoka',sans-serif;
    cursor:pointer;
  }

  .disabled{
    opacity:0.35;
    filter:saturate(.6);
  }

  .status{
    margin-top:8px;
    text-align:center;
    font-size:16px;
    color:#ffffffd0;
    line-height:1.2;
  }

  .zoom{
    display:grid;
    gap:8px;
  }
  .zoom-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:5px;
  }
  .zoom-btn{
    border:0;
    border-radius:10px;
    height:44px;
    font:700 16px 'Fredoka',sans-serif;
    color:#fff;
    background:var(--muted);
    cursor:pointer;
  }

  .pegamole-btn{
    border:0;
    border-radius:10px;
    height:44px;
    font:700 16px 'Fredoka',sans-serif;
    color:#fff;
    background:#8B5E3C;
    cursor:pointer;
    width:100%;
    transition: background 0.15s;
  }
  .pegamole-btn:hover{ background:#A0704A; }
  .pegamole-btn:active{ transform:scale(0.97); }

  .tiny{
    text-align:center;
    font-size:14px;
    color:#ffffffc7;
    line-height:1.15;
  }

  .score-display{
    text-align:center;
    font-size:15px;
    color:#FFD700;
    font-weight:600;
  }

  /* Quiz panel */
  .quiz-panel{
    display:none;
    flex-direction:column;
    gap:10px;
    padding:4px 0;
    overflow-y:auto;
  }
  .quiz-panel.active{ display:flex; }

  .quiz-category-label{
    font-size:11px;
    font-weight:600;
    color:#fff5;
    letter-spacing:0.5px;
    text-transform:uppercase;
    padding:0 4px;
  }
  .quiz-prompt{
    font-size:17px;
    font-weight:600;
    line-height:1.35;
    color:#fffd;
    padding:0 4px;
  }
  .quiz-choices{
    display:grid;
    gap:6px;
  }
  .quiz-choice{
    border:2px solid #5a5a7a;
    border-radius:10px;
    padding:12px 14px;
    font:600 17px 'Fredoka',sans-serif;
    color:#fff;
    background:#3a3a50;
    cursor:pointer;
    text-align:left;
    transition:all .12s;
  }
  .quiz-choice:hover{ background:#4a4a60; border-color:#7a7a9a; }
  .quiz-choice.correct{
    background:#2f7f1f44;
    border-color:#4CAF50;
    color:#7FE07F;
  }
  .quiz-choice.wrong{
    background:#d9000033;
    border-color:#E05555;
    color:#FF9999;
  }
  .quiz-choice:disabled{ cursor:default; }
  .quiz-choice:disabled:hover{ background:#3a3a50; border-color:#5a5a7a; }
  .quiz-choice:disabled.correct:hover{ background:#2f7f1f44; border-color:#4CAF50; }
  .quiz-choice:disabled.wrong:hover{ background:#d9000033; border-color:#E05555; }

  .quiz-feedback{
    font-size:15px;
    font-weight:600;
    padding:8px 10px;
    border-radius:8px;
    text-align:center;
    min-height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .quiz-feedback.right{ background:#2f7f1f33; color:#7FE07F; }
  .quiz-feedback.wrong{ background:#d9000033; color:#FF9999; }

  .quiz-next{
    border:0;
    border-radius:10px;
    height:44px;
    font:700 16px 'Fredoka',sans-serif;
    color:#fff;
    background:#6e6ea0;
    cursor:pointer;
    transition:all .12s;
  }
  .quiz-next:hover{ background:#8080b0; }

  .quiz-progress{
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 4px;
  }
  .quiz-progress-bar{
    flex:1;
    height:8px;
    background:#2a2a3a;
    border-radius:4px;
    overflow:hidden;
  }
  .quiz-progress-fill{
    height:100%;
    background:#6e6ea0;
    border-radius:4px;
    transition:width 0.3s;
  }
  .quiz-score-text{
    font-size:13px;
    color:#fff9;
    white-space:nowrap;
  }

  .quiz-topic-btns{
    display:grid;
    gap:5px;
  }
  .topic-btn{
    border:2px solid #5a5a7a;
    border-radius:10px;
    padding:10px 12px;
    font:600 14px 'Fredoka',sans-serif;
    color:#fffc;
    background:#3a3a50;
    cursor:pointer;
    text-align:left;
    transition:all .12s;
  }
  .topic-btn:hover{ background:#4a4a60; border-color:#7a7a9a; }
  .topic-btn .topic-emoji{ margin-right:6px; }

  .stage{
    height:100%;
    display:flex;
    align-items:stretch;
    justify-content:center;
  }

  .viewport{
    height:100%;
    width:min(100%, 100vh);
    aspect-ratio:1/1;
    background:#222;
  }

  canvas{
    width:100%;
    height:100%;
    display:block;
  }

  @media (max-width: 900px){
    .app{ grid-template-columns: clamp(250px, 38vw, 320px) 1fr; }
    .view-btn,.zoom-btn,.pegamole-btn{ height:36px; font-size:13px; }
    .compass{
      width:min(100%, 236px);
      grid-template-columns: 72px 72px 72px;
      grid-template-rows: 72px 72px 72px;
      gap:10px;
    }
    .arrow{ font-size:24px; }
    .arrow.up,.arrow.down,.arrow.left,.arrow.right{ width:72px; height:72px; }
    .home{ width:72px; height:72px; font-size:32px; border-radius:12px; }
    .status{ font-size:12px; }
    .tiny{ font-size:11px; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="panel">
    <div class="view-select">
      <button id="btnStreet" class="view-btn active" onclick="setMode('street')">🚶 Street</button>
      <button id="btnElevator" class="view-btn" onclick="setMode('elevator')">🛗 Elevator</button>
      <button id="btnBoth" class="view-btn" onclick="setMode('both')">📍 Both</button>
      <button id="btnQuiz" class="view-btn" onclick="setMode('quiz')">🧠 Activities</button>
    </div>

    <div class="center-controls" id="mainControls">
      <div>
        <div class="compass">
          <button id="upBtn" class="arrow up pos" onclick="pressUp()">+1</button>
          <button id="leftBtn" class="arrow left neg" onclick="pressLeft()">-1</button>
          <button class="home" onclick="goHome()">🏠</button>
          <button id="rightBtn" class="arrow right pos" onclick="pressRight()">+1</button>
          <button id="downBtn" class="arrow down neg" onclick="pressDown()">-1</button>
        </div>
        <div id="status" class="status">Walker: 0 | Ellie: 0 | Point: (0, 0)</div>
      </div>
    </div>

    <!-- Quiz panel -->
    <div class="quiz-panel" id="quizPanel">
      <div id="quizTopicSelect" class="quiz-topic-btns"></div>
      <div id="quizActive" style="display:none;">
        <div class="quiz-progress" style="margin-bottom:8px;">
          <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill"></div></div>
          <div class="quiz-score-text" id="quizScoreText">0/0</div>
        </div>
        <div class="quiz-category-label" id="quizCategoryLabel"></div>
        <div class="quiz-prompt" id="quizPrompt" style="margin:8px 0;"></div>
        <div class="quiz-choices" id="quizChoices"></div>
        <div class="quiz-feedback" id="quizFeedback" style="display:none;"></div>
        <button class="quiz-next" id="quizNextBtn" style="display:none;margin-top:8px;" onclick="quizNext()">Next Question →</button>
      </div>
    </div>

    <div class="zoom">
      <div id="pegamoleControls" style="display:none; margin-bottom:8px;">
        <button class="pegamole-btn" onclick="spawnPegamole()">🐾 Find Pegamole!</button>
        <div id="pegamoleStatus" class="tiny" style="margin-top:6px;">Press the button to hide Pegamole!</div>
        <div id="scoreDisplay" class="score-display" style="margin-top:4px;"></div>
      </div>
      <div class="zoom-row">
        <button class="zoom-btn" onclick="zoom(-1)">Zoom In</button>
        <button class="zoom-btn" onclick="resetZoom()">Reset</button>
        <button class="zoom-btn" onclick="zoom(1)">Zoom Out</button>
      </div>
      <div id="rangeText" class="tiny">View: -10..+10</div>
      <div class="tiny">Green up/right = +1, red down/left = -1</div>
    </div>
  </aside>

  <main class="stage">
    <div class="viewport">
      <canvas id="canvas"></canvas>
    </div>
  </main>
</div>

<script>
const HARD_LIMIT = 100;
const MIN_RANGE = 3;
const MAX_RANGE = 24;

const C = {
  sky:'#87CEEB', ground:'#C4A265', grass:'#5A9E3E', road:'#555', dash:'#E8C840',
  pos:'#3A7D3E', neg:'#B04040',
  houseWall:'#3D8B6E', houseStroke:'#2D6B4E', roof:'#8B3A2F', door:'#6B4226', knob:'#C4A265', window:'#ADE0F7',
  floorUp:'#D4594A', floorUpStroke:'#B03A2F', floorDown:'#7A6050', floorDownStroke:'#5A4030',
  walker:'#EAEAEA', ellie:'#FFD700',
  pegamole:'#6B4226', pegamoleWing:'#D4C5A9'
};

const state = {
  mode: 'street',
  zoom: { street: 10, elevator: 10, bothX: 10, bothY: 10 },
  walker: { pos:0, animPos:0, animating:false, stepPhase:0, lastDir:1 },
  ellie:  { pos:0, animPos:0, animating:false },
  pegamole: {
    active: false,
    x: 0, y: 0,
    found: false,
    celebrating: false,
    celebrateStart: 0,
    score: 0,
    totalMoves: 0,
    wingPhase: 0
  }
};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let wingAnimFrame = null;

function fp(n){ return n === 0 ? '0' : (n > 0 ? '+' + n : '' + n); }
// Axis labels: no + sign on positives, just the number
function axl(n){ return '' + n; }
function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

function resize(){
  const r = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(2, Math.floor(r.width * dpr));
  canvas.height = Math.max(2, Math.floor(r.height * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
window.addEventListener('resize', resize);

function setMode(mode){
  state.mode = mode;
  document.getElementById('btnStreet').classList.toggle('active', mode === 'street');
  document.getElementById('btnElevator').classList.toggle('active', mode === 'elevator');
  document.getElementById('btnBoth').classList.toggle('active', mode === 'both');
  document.getElementById('btnQuiz').classList.toggle('active', mode === 'quiz');
  document.getElementById('pegamoleControls').style.display = mode === 'both' ? 'block' : 'none';
  document.getElementById('mainControls').style.display = mode === 'quiz' ? 'none' : '';
  document.getElementById('quizPanel').classList.toggle('active', mode === 'quiz');
  document.querySelector('.zoom').style.display = mode === 'quiz' ? 'none' : '';
  if (mode === 'quiz') showTopicSelect();
  refreshArrowState();
  updatePanelText();
  draw();
}

function refreshArrowState(){
  const xEnabled = state.mode !== 'elevator';
  const yEnabled = state.mode !== 'street';
  document.getElementById('leftBtn').classList.toggle('disabled', !xEnabled);
  document.getElementById('rightBtn').classList.toggle('disabled', !xEnabled);
  document.getElementById('upBtn').classList.toggle('disabled', !yEnabled);
  document.getElementById('downBtn').classList.toggle('disabled', !yEnabled);
}

function animateTo(ch, target){
  if (ch.animating) return;
  const start = Math.round(ch.animPos);
  const dist = Math.abs(target - start);
  if (dist === 0) { ch.animPos = target; draw(); checkPegamoleFound(); return; }

  ch.animating = true;
  if ('lastDir' in ch) ch.lastDir = target > start ? 1 : -1;
  const dir = target > start ? 1 : -1;

  let currentStep = 0;

  function walkOneStep(){
    if (currentStep >= dist){
      ch.animPos = target;
      ch.animating = false;
      if ('stepPhase' in ch) ch.stepPhase = 0;
      draw();
      checkPegamoleFound();
      return;
    }

    const from = start + currentStep * dir;
    const to = from + dir;
    const stepStart = performance.now();
    const stepDur = 350; // ms per step — deliberate cadence

    function tick(now){
      const t = Math.min((now - stepStart) / stepDur, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      ch.animPos = from + dir * ease;
      if ('stepPhase' in ch) ch.stepPhase = Math.sin(t * Math.PI);
      draw();
      if (t < 1) requestAnimationFrame(tick);
      else {
        ch.animPos = to;
        if ('stepPhase' in ch) ch.stepPhase = 0;
        currentStep++;
        // Small pause between steps
        setTimeout(walkOneStep, 80);
      }
    }
    requestAnimationFrame(tick);
  }

  walkOneStep();
}

// Walk multiple legs sequentially with a pause between each leg
function multiStepAnimateTo(ch, startPos, legs, onDone){
  let legIdx = 0;
  let pos = startPos;

  function doNextLeg(){
    if(legIdx >= legs.length){
      ch.animating = false;
      if ('stepPhase' in ch) ch.stepPhase = 0;
      draw();
      if(onDone) onDone();
      return;
    }

    const leg = legs[legIdx];
    const target = pos + leg;
    ch.pos = target;

    // Walk this leg step by step
    const dist = Math.abs(leg);
    const dir = leg > 0 ? 1 : -1;
    if ('lastDir' in ch) ch.lastDir = dir;
    let step = 0;

    function walkStep(){
      if(step >= dist){
        ch.animPos = target;
        if ('stepPhase' in ch) ch.stepPhase = 0;
        pos = target;
        legIdx++;
        draw();
        // Pause between legs so you can see each segment
        setTimeout(doNextLeg, 400);
        return;
      }

      const from = pos + step * dir;
      const to = from + dir;
      const t0 = performance.now();
      const dur = 320;

      function tick(now){
        const t = Math.min((now - t0) / dur, 1);
        const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        ch.animPos = from + dir * ease;
        if ('stepPhase' in ch) ch.stepPhase = Math.sin(t * Math.PI);
        draw();
        if(t < 1) requestAnimationFrame(tick);
        else {
          ch.animPos = to;
          if ('stepPhase' in ch) ch.stepPhase = 0;
          step++;
          setTimeout(walkStep, 60);
        }
      }
      requestAnimationFrame(tick);
    }

    walkStep();
  }

  ch.animating = true;
  doNextLeg();
}

function nudge(ch, dir){
  if (ch.animating) return;
  const next = ch.pos + dir;
  if (next < -HARD_LIMIT || next > HARD_LIMIT) return;
  ch.animating = true;
  ch.pos = next;
  if ('lastDir' in ch) ch.lastDir = dir;
  if (state.pegamole.active && !state.pegamole.found) state.pegamole.totalMoves++;
  updatePanelText();
  const start = ch.animPos;
  const end = next;
  const t0 = performance.now();
  const dur = 340;
  function step(now){
    const t = Math.min((now - t0) / dur, 1);
    const e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    ch.animPos = start + (end - start) * e;
    if ('stepPhase' in ch) ch.stepPhase = Math.sin(t * Math.PI);
    draw();
    if (t < 1) requestAnimationFrame(step);
    else {
      ch.animPos = end;
      ch.animating = false;
      if ('stepPhase' in ch) ch.stepPhase = 0;
      draw();
      checkPegamoleFound();
    }
  }
  requestAnimationFrame(step);
}

function pressLeft(){ if (state.mode !== 'elevator') nudge(state.walker, -1); }
function pressRight(){ if (state.mode !== 'elevator') nudge(state.walker, +1); }
function pressUp(){ if (state.mode !== 'street') nudge(state.ellie, +1); }
function pressDown(){ if (state.mode !== 'street') nudge(state.ellie, -1); }

function goHome(){
  animateTo(state.walker, 0);
  animateTo(state.ellie, 0);
  state.walker.pos = 0;
  state.ellie.pos = 0;
  updatePanelText();
}

function zoom(dir){
  if (state.mode === 'street') state.zoom.street = clamp(state.zoom.street + dir, MIN_RANGE, MAX_RANGE);
  else if (state.mode === 'elevator') state.zoom.elevator = clamp(state.zoom.elevator + dir, MIN_RANGE, MAX_RANGE);
  else {
    state.zoom.bothX = clamp(state.zoom.bothX + dir, MIN_RANGE, MAX_RANGE);
    state.zoom.bothY = clamp(state.zoom.bothY + dir, MIN_RANGE, MAX_RANGE);
  }
  updatePanelText(); draw();
}

function resetZoom(){
  if (state.mode === 'street') state.zoom.street = 10;
  else if (state.mode === 'elevator') state.zoom.elevator = 10;
  else { state.zoom.bothX = 10; state.zoom.bothY = 10; }
  updatePanelText(); draw();
}

// ========== PEGAMOLE ==========
function spawnPegamole(){
  const pm = state.pegamole;
  const rx = state.zoom.bothX;
  const ry = state.zoom.bothY;
  // Random position within current zoom range, excluding origin
  let px, py;
  do {
    px = Math.floor(Math.random() * (rx * 2 + 1)) - rx;
    py = Math.floor(Math.random() * (ry * 2 + 1)) - ry;
  } while (px === 0 && py === 0);

  pm.x = px;
  pm.y = py;
  pm.active = true;
  pm.found = false;
  pm.celebrating = false;
  pm.totalMoves = 0;

  // Start wing flapping animation
  startWingAnim();

  updatePanelText();
  draw();
}

function startWingAnim(){
  if (wingAnimFrame) return;
  function flap(){
    state.pegamole.wingPhase = (performance.now() / 200) % (Math.PI * 2);
    draw();
    if (state.pegamole.active) wingAnimFrame = requestAnimationFrame(flap);
    else wingAnimFrame = null;
  }
  wingAnimFrame = requestAnimationFrame(flap);
}

function checkPegamoleFound(){
  const pm = state.pegamole;
  if (!pm.active || pm.found) return;
  if (state.walker.pos === pm.x && state.ellie.pos === pm.y) {
    pm.found = true;
    pm.celebrating = true;
    pm.celebrateStart = performance.now();
    pm.score++;
    updatePanelText();
    // Celebrate for 2 seconds then allow respawn
    setTimeout(() => {
      pm.celebrating = false;
      draw();
    }, 2500);
  }
}

function updatePanelText(){
  const w = state.walker.pos;
  const e = state.ellie.pos;
  document.getElementById('status').textContent = `Walker: ${axl(w)} | Ellie: ${axl(e)} | Point: (${axl(w)}, ${axl(e)})`;

  let txt;
  if (state.mode === 'street') {
    txt = `View: -${state.zoom.street}..${state.zoom.street}`;
  } else if (state.mode === 'elevator') {
    txt = `View: -${state.zoom.elevator}..${state.zoom.elevator}`;
  } else {
    txt = `X: -${state.zoom.bothX}..${state.zoom.bothX} | Y: -${state.zoom.bothY}..${state.zoom.bothY}`;
  }
  document.getElementById('rangeText').textContent = txt;

  // Pegamole status
  const pm = state.pegamole;
  const psEl = document.getElementById('pegamoleStatus');
  const scEl = document.getElementById('scoreDisplay');
  if (state.mode === 'both') {
    if (!pm.active) {
      psEl.textContent = 'Press the button to hide Pegamole!';
    } else if (pm.found) {
      psEl.textContent = `🎉 Found Pegamole at (${axl(pm.x)}, ${axl(pm.y)}) in ${pm.totalMoves} moves!`;
    } else {
      // Hint: how far away
      const dx = pm.x - w;
      const dy = pm.y - e;
      const xHint = dx === 0 ? "Walker is lined up!" : (dx > 0 ? `Walker: ${dx} more to the right` : `Walker: ${-dx} more to the left`);
      const yHint = dy === 0 ? "Ellie is lined up!" : (dy > 0 ? `Ellie: ${dy} more up` : `Ellie: ${-dy} more down`);
      psEl.textContent = `🐾 ${xHint} · ${yHint}`;
    }
    scEl.textContent = pm.score > 0 ? `Pegamoles found: ${pm.score}` : '';
  }
}

// ========== DRAWING ==========
function drawSkyGround(w, h, horizonY){
  ctx.fillStyle = C.sky; ctx.fillRect(0, 0, w, horizonY);
  ctx.fillStyle = C.ground; ctx.fillRect(0, horizonY, w, h - horizonY);
}

function drawHouseWithRoof(x, y, w, h){
  ctx.fillStyle = C.houseWall; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = C.houseStroke; ctx.lineWidth = 1.4; ctx.strokeRect(x, y, w, h);
  const roofH = h * 0.3;
  ctx.fillStyle = C.roof;
  ctx.beginPath();
  ctx.moveTo(x - w * 0.1, y);
  ctx.lineTo(x + w / 2, y - roofH);
  ctx.lineTo(x + w * 1.1, y);
  ctx.closePath(); ctx.fill();
}

function drawGroundFloor(x, y, w, h){
  ctx.fillStyle = C.houseWall; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = C.houseStroke; ctx.lineWidth = 1.4; ctx.strokeRect(x, y, w, h);
}

function drawStreetWorld(cx, roadY, unit, range, showLabels){
  const roadH = unit;
  ctx.fillStyle = C.road; ctx.fillRect(0, roadY, canvas.clientWidth, roadH);
  ctx.fillStyle = C.dash;
  for (let i = -range; i <= range; i++){
    if (i === 0 || Math.abs(i) % 2 !== 0) continue;
    const x = cx + i * unit - unit / 2;
    ctx.fillRect(x + unit * 0.08, roadY + roadH * 0.43, unit * 0.84, roadH * 0.14);
  }
  drawHouseWithRoof(cx - unit / 2, roadY, unit, roadH);
  if (showLabels){
    ctx.font = `bold ${Math.max(12, unit * 0.4)}px Fredoka`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (let i = -range; i <= range; i++){
      if (i === 0) continue;
      ctx.fillStyle = i > 0 ? C.pos : C.neg;
      ctx.fillText(axl(i), cx + i * unit, roadY + roadH + 3);
    }
  }
}

function drawElevatorWorld(cx, cy, unit, range, showLabels){
  const shaftX = cx - unit / 2;
  for (let i = -range; i <= range; i++){
    if (i === 0) continue;
    const fy = cy - i * unit - unit / 2;
    if (i > 0){
      ctx.fillStyle = C.floorUp; ctx.fillRect(shaftX, fy, unit, unit);
      ctx.strokeStyle = C.floorUpStroke; ctx.lineWidth = 0.7; ctx.strokeRect(shaftX, fy, unit, unit);
      const ws = unit * 0.18;
      ctx.fillStyle = C.window; ctx.fillRect(shaftX + unit/2 - ws/2, fy + unit*0.35, ws, ws);
    } else {
      ctx.fillStyle = C.floorDown; ctx.fillRect(shaftX, fy, unit, unit);
      ctx.strokeStyle = C.floorDownStroke; ctx.lineWidth = 0.7; ctx.strokeRect(shaftX, fy, unit, unit);
    }
    if (showLabels){
      ctx.fillStyle = i > 0 ? C.pos : C.neg;
      ctx.font = `bold ${Math.max(12, unit*0.38)}px Fredoka`;
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(axl(i), shaftX + unit + 5, fy + unit/2);
    }
  }
  const topY = cy - range * unit - unit / 2;
  ctx.fillStyle = C.roof;
  ctx.beginPath();
  ctx.moveTo(shaftX - unit*0.12, topY);
  ctx.lineTo(cx, topY - unit*0.4);
  ctx.lineTo(shaftX + unit*1.12, topY);
  ctx.closePath(); ctx.fill();

  drawGroundFloor(shaftX, cy - unit/2, unit, unit);

  ctx.strokeStyle = '#00000020'; ctx.lineWidth = 1;
  const bottomY = cy + range * unit + unit / 2;
  ctx.beginPath();
  ctx.moveTo(shaftX+3, topY); ctx.lineTo(shaftX+3, bottomY);
  ctx.moveTo(shaftX+unit-3, topY); ctx.lineTo(shaftX+unit-3, bottomY);
  ctx.stroke();
  return shaftX;
}

function drawWalker(cx, cy, unit, phase, dir){
  const s = unit * 0.9;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = C.walker; ctx.strokeStyle = C.walker;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const headR = s*0.12, headY = -s*0.42;
  ctx.beginPath(); ctx.arc(0, headY, headR, 0, Math.PI*2); ctx.fill();

  // Nose
  ctx.beginPath();
  ctx.moveTo(headR*0.95, headY - headR*0.15);
  ctx.lineTo(headR + s*0.16, headY);
  ctx.lineTo(headR*0.95, headY + headR*0.15);
  ctx.closePath(); ctx.fill();

  const shoulderY = headY + headR + s*0.04;
  const hipY = -s*0.08;
  ctx.lineWidth = Math.max(2.5, s*0.07);
  ctx.beginPath(); ctx.moveTo(0, shoulderY); ctx.lineTo(0, hipY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, shoulderY+s*0.02); ctx.lineTo(-s*0.13, shoulderY+s*0.14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, shoulderY+s*0.04); ctx.lineTo(s*0.18, shoulderY+s*0.18); ctx.stroke();

  const swing = phase * s * 0.11 * dir;
  ctx.lineWidth = Math.max(3, s*0.085);
  ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(s*0.23+swing, s*0.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(-s*0.2-swing*0.55, s*0.24); ctx.stroke();

  ctx.restore();
}

function drawEllie(cx, cy, unit){
  const s = unit * 0.88;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = C.ellie; ctx.strokeStyle = C.ellie;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const headR = s*0.11, headY = -s*0.42;
  ctx.beginPath(); ctx.arc(0, headY, headR, 0, Math.PI*2); ctx.fill();

  const shoulderY = headY + headR + s*0.03;
  const hemY = s*0.1;
  const sw = s*0.11, hw = s*0.24;
  ctx.beginPath();
  ctx.moveTo(-sw, shoulderY); ctx.lineTo(sw, shoulderY);
  ctx.lineTo(hw, hemY); ctx.lineTo(-hw, hemY);
  ctx.closePath(); ctx.fill();

  ctx.lineWidth = Math.max(2.2, s*0.06);
  ctx.beginPath(); ctx.moveTo(-sw, shoulderY+s*0.01); ctx.lineTo(-s*0.2, shoulderY+s*0.18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sw, shoulderY+s*0.01); ctx.lineTo(s*0.2, shoulderY+s*0.18); ctx.stroke();

  ctx.lineWidth = Math.max(2.6, s*0.065);
  ctx.beginPath(); ctx.moveTo(-s*0.07, hemY); ctx.lineTo(-s*0.08, hemY+s*0.26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*0.07, hemY); ctx.lineTo(s*0.08, hemY+s*0.26); ctx.stroke();

  ctx.restore();
}

// ===== PEGAMOLE — side-profile mole with tiny wings =====
function drawPegamole(pcx, pcy, unit, wingPhase, celebrating){
  const s = unit * 0.82;
  ctx.save();
  ctx.translate(pcx, pcy);

  // Celebration bounce
  let bounce = 0;
  if (celebrating) {
    const t = (performance.now() - state.pegamole.celebrateStart) / 300;
    bounce = Math.abs(Math.sin(t * Math.PI * 2)) * s * 0.18;
  }
  ctx.translate(0, -bounce);

  // Shadow
  ctx.fillStyle = '#00000025';
  ctx.beginPath();
  ctx.ellipse(0, s * 0.36 + bounce, s * 0.3, s * 0.045, 0, 0, Math.PI * 2);
  ctx.fill();

  // === WINGS — big white pegasus wings! ===
  const wingFlap = Math.sin(wingPhase) * 0.55;

  // Draw each wing as layered feather shapes
  function drawPegasusWing(xOff, yOff, baseAngle, flapAmt, isFar){
    ctx.save();
    ctx.translate(xOff, yOff);
    ctx.rotate(baseAngle - flapAmt);

    const opacity = isFar ? 0.85 : 1;

    // Outer wing shape (largest feather layer)
    ctx.fillStyle = `rgba(255,255,255,${opacity})`;
    ctx.strokeStyle = `rgba(200,200,210,${opacity})`;
    ctx.lineWidth = Math.max(0.8, s * 0.015);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-s*0.15, -s*0.35, -s*0.05, -s*0.55);
    ctx.quadraticCurveTo(s*0.02, -s*0.58, s*0.08, -s*0.5);
    ctx.quadraticCurveTo(s*0.12, -s*0.42, s*0.1, -s*0.32);
    ctx.quadraticCurveTo(s*0.08, -s*0.2, 0, 0);
    ctx.fill(); ctx.stroke();

    // Middle feather layer
    ctx.fillStyle = `rgba(240,240,245,${opacity})`;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-s*0.1, -s*0.25, -s*0.02, -s*0.42);
    ctx.quadraticCurveTo(s*0.04, -s*0.44, s*0.08, -s*0.36);
    ctx.quadraticCurveTo(s*0.07, -s*0.2, 0, 0);
    ctx.fill();

    // Inner feather layer
    ctx.fillStyle = `rgba(230,230,238,${opacity})`;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-s*0.06, -s*0.16, 0, -s*0.28);
    ctx.quadraticCurveTo(s*0.04, -s*0.3, s*0.06, -s*0.22);
    ctx.quadraticCurveTo(s*0.04, -s*0.1, 0, 0);
    ctx.fill();

    // Feather line details
    ctx.strokeStyle = `rgba(190,190,200,${opacity * 0.6})`;
    ctx.lineWidth = Math.max(0.5, s * 0.008);
    for (let f = 0; f < 4; f++){
      const fy = -s * (0.12 + f * 0.1);
      ctx.beginPath();
      ctx.moveTo(-s*0.01, fy);
      ctx.quadraticCurveTo(s*0.03, fy - s*0.04, s*0.06, fy - s*0.02);
      ctx.stroke();
    }

    ctx.restore();
  }

  // Far wing (behind body, slightly offset)
  drawPegasusWing(-s * 0.08, -s * 0.14, -0.3, wingFlap * 0.8, true);
  // Near wing (in front, main wing)
  drawPegasusWing(-s * 0.02, -s * 0.16, -0.15, wingFlap, false);

  // === BODY — fat horizontal oval, facing right ===
  ctx.fillStyle = '#3E2A1A';
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.33, s * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Fur texture — slightly lighter top
  ctx.fillStyle = '#4E3828';
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.04, s * 0.3, s * 0.12, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#6B5540';
  ctx.beginPath();
  ctx.ellipse(s * 0.02, s * 0.08, s * 0.2, s * 0.1, 0, 0, Math.PI);
  ctx.fill();

  // === STUBBY TAIL ===
  ctx.fillStyle = '#4E3828';
  ctx.beginPath();
  ctx.ellipse(-s * 0.34, -s * 0.01, s * 0.055, s * 0.03, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // === HEAD — pointy snout facing right ===
  ctx.fillStyle = '#3E2A1A';
  ctx.beginPath();
  ctx.ellipse(s * 0.26, -s * 0.02, s * 0.17, s * 0.15, -0.1, 0, Math.PI * 2);
  ctx.fill();

  // Long pointy snout
  ctx.fillStyle = '#4E3525';
  ctx.beginPath();
  ctx.moveTo(s * 0.36, -s * 0.11);
  ctx.quadraticCurveTo(s * 0.56, -s * 0.1, s * 0.58, -s * 0.05);
  ctx.quadraticCurveTo(s * 0.54, 0, s * 0.36, s * 0.02);
  ctx.closePath();
  ctx.fill();

  // Big pink nose (star-nosed mole style — prominent!)
  ctx.fillStyle = '#F0908A';
  ctx.beginPath();
  ctx.arc(s * 0.58, -s * 0.04, s * 0.05, 0, Math.PI * 2);
  ctx.fill();
  // Nose highlight
  ctx.fillStyle = '#F8B0A8';
  ctx.beginPath();
  ctx.arc(s * 0.575, -s * 0.055, s * 0.02, 0, Math.PI * 2);
  ctx.fill();

  // Tiny squinty eye (moles are nearly blind)
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(s * 0.32, -s * 0.08, s * 0.018, s * 0.012, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tiny ear bump
  ctx.fillStyle = '#4E3525';
  ctx.beginPath();
  ctx.arc(s * 0.2, -s * 0.15, s * 0.028, 0, Math.PI * 2);
  ctx.fill();

  // Whiskers
  ctx.strokeStyle = '#8A7A6A';
  ctx.lineWidth = Math.max(0.5, s * 0.01);
  for (let ww = 0; ww < 3; ww++){
    const wy = -s * 0.04 + ww * s * 0.022;
    ctx.beginPath();
    ctx.moveTo(s * 0.42, wy);
    ctx.lineTo(s * 0.52, wy - s * 0.015 + ww * s * 0.015);
    ctx.stroke();
  }

  // === FRONT PAW — BIG shovel paw (THE mole signature) ===
  ctx.fillStyle = '#5A4030';
  // Big front digging paw
  ctx.beginPath();
  ctx.ellipse(s * 0.18, s * 0.22, s * 0.13, s * 0.065, 0.3, 0, Math.PI * 2);
  ctx.fill();
  // Claw fingers splayed
  ctx.strokeStyle = '#DDD';
  ctx.lineWidth = Math.max(1.2, s * 0.025);
  ctx.lineCap = 'round';
  const fClaws = [
    { x: s*0.28, y: s*0.18, dx: s*0.07, dy: -s*0.01 },
    { x: s*0.3, y: s*0.22, dx: s*0.07, dy: s*0.02 },
    { x: s*0.28, y: s*0.26, dx: s*0.06, dy: s*0.04 },
    { x: s*0.24, y: s*0.28, dx: s*0.04, dy: s*0.05 },
  ];
  for (const cl of fClaws){
    ctx.beginPath(); ctx.moveTo(cl.x, cl.y); ctx.lineTo(cl.x+cl.dx, cl.y+cl.dy); ctx.stroke();
  }

  // Back paw (smaller)
  ctx.fillStyle = '#5A4030';
  ctx.beginPath();
  ctx.ellipse(-s * 0.16, s * 0.22, s * 0.08, s * 0.045, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#DDD';
  ctx.lineWidth = Math.max(1, s * 0.02);
  const bClaws = [
    { x: -s*0.22, y: s*0.2, dx: -s*0.04, dy: -s*0.01 },
    { x: -s*0.23, y: s*0.23, dx: -s*0.04, dy: s*0.015 },
    { x: -s*0.21, y: s*0.26, dx: -s*0.03, dy: s*0.03 },
  ];
  for (const cl of bClaws){
    ctx.beginPath(); ctx.moveTo(cl.x, cl.y); ctx.lineTo(cl.x+cl.dx, cl.y+cl.dy); ctx.stroke();
  }

  // === CELEBRATION STARS ===
  if (celebrating){
    const ct = (performance.now() - state.pegamole.celebrateStart) / 1000;
    ctx.fillStyle = '#FFD700';
    for (let i = 0; i < 6; i++){
      const angle = ct * 3 + i * Math.PI * 2 / 6;
      const dist = s * (0.5 + ct * 0.4);
      const stx = Math.cos(angle) * dist;
      const sty = Math.sin(angle) * dist;
      const starSize = s * 0.07 * Math.max(0, 1 - ct * 0.35);
      if (starSize > 0) drawStar(stx, sty, starSize);
    }
  }

  ctx.restore();
}

function drawStar(x, y, r){
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  for (let i = 0; i < 5; i++){
    const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function getSceneUnit(w, h, rx, ry){
  return Math.min((w - 10) / (rx * 2 + 1), (h - 10) / (ry * 2 + 1.8));
}

function draw(){
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  const cx = w / 2;
  const cy = h / 2;
  ctx.clearRect(0, 0, w, h);

  if (state.mode === 'street'){
    const r = state.zoom.street;
    const unit = getSceneUnit(w, h, r, r);
    const roadY = cy - unit / 2;
    drawSkyGround(w, h, roadY + unit);
    drawStreetWorld(cx, roadY, unit, r, true);
    drawWalker(cx + state.walker.animPos * unit, roadY + unit/2 + unit*0.08, unit, state.walker.stepPhase, state.walker.lastDir);
  }
  else if (state.mode === 'elevator'){
    const r = state.zoom.elevator;
    const unit = getSceneUnit(w, h, r, r);
    drawSkyGround(w, h, cy + unit/2);
    ctx.fillStyle = C.road;
    ctx.fillRect(0, cy - unit/2, w, unit);
    ctx.fillStyle = C.dash;
    for (let i = -r; i <= r; i++){
      if (i === 0 || Math.abs(i) % 2 !== 0) continue;
      const dx = cx + i * unit - unit/2;
      ctx.fillRect(dx + unit*0.08, cy - unit*0.07, unit*0.84, unit*0.14);
    }
    const shaftX = drawElevatorWorld(cx, cy, unit, r, true);
    const ey = cy - state.ellie.animPos * unit;
    ctx.fillStyle = '#99999955';
    ctx.fillRect(shaftX+3, ey - unit/2+3, unit-6, unit-6);
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.4;
    ctx.strokeRect(shaftX+3, ey - unit/2+3, unit-6, unit-6);
    drawEllie(cx, ey, unit);
  }
  else if (state.mode === 'both' || state.mode === 'quiz') {
    // Quiz mode uses the "both" viz but picks street/elevator/both based on question
    const quizViz = (state.mode === 'quiz' && quiz.currentQ) ? quiz.currentQ.viz : 'both';

    if (quizViz === 'street') {
      const r = state.zoom.street;
      const unit = getSceneUnit(w, h, r, r);
      const roadY = cy - unit / 2;
      drawSkyGround(w, h, roadY + unit);
      drawStreetWorld(cx, roadY, unit, r, true);

      // Pegamole on the street (for distance/comparison questions)
      if(state.mode === 'quiz' && quiz.pegamoleX !== null){
        const pmX = cx + quiz.pegamoleX * unit;
        const pmY = roadY + unit/2 + unit*0.08;
        const wph = (performance.now() / 200) % (Math.PI * 2);
        drawPegamole(pmX, pmY, unit * 0.85, wph, false);
      }

      drawWalker(cx + state.walker.animPos * unit, roadY + unit/2 + unit*0.08, unit, state.walker.stepPhase, state.walker.lastDir);

      // Distance bracket
      if(state.mode === 'quiz' && quiz.showDistanceBracket && quiz.currentQ && quiz.currentQ.distA !== undefined){
        const q = quiz.currentQ;
        const ax = cx + q.distA * unit;
        const bx = cx + q.distB * unit;
        const bracketY = roadY + unit + unit*0.55;
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        // Horizontal line
        ctx.beginPath(); ctx.moveTo(ax, bracketY); ctx.lineTo(bx, bracketY); ctx.stroke();
        // End ticks
        ctx.beginPath(); ctx.moveTo(ax, bracketY - unit*0.12); ctx.lineTo(ax, bracketY + unit*0.12); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx, bracketY - unit*0.12); ctx.lineTo(bx, bracketY + unit*0.12); ctx.stroke();
        // Distance label
        ctx.fillStyle = '#FFD700';
        ctx.font = `bold ${Math.max(11, unit*0.3)}px Fredoka`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(`${q.distanceAnswer} steps`, (ax+bx)/2, bracketY + unit*0.15);
      }
    } else if (quizViz === 'elevator') {
      const r = state.zoom.elevator;
      const unit = getSceneUnit(w, h, r, r);
      drawSkyGround(w, h, cy + unit/2);
      ctx.fillStyle = C.road;
      ctx.fillRect(0, cy - unit/2, w, unit);
      ctx.fillStyle = C.dash;
      for (let i = -r; i <= r; i++){
        if (i === 0 || Math.abs(i) % 2 !== 0) continue;
        const dx = cx + i * unit - unit/2;
        ctx.fillRect(dx + unit*0.08, cy - unit*0.07, unit*0.84, unit*0.14);
      }
      const shaftX = drawElevatorWorld(cx, cy, unit, r, true);
      const ey = cy - state.ellie.animPos * unit;
      ctx.fillStyle = '#99999955';
      ctx.fillRect(shaftX+3, ey - unit/2+3, unit-6, unit-6);
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.4;
      ctx.strokeRect(shaftX+3, ey - unit/2+3, unit-6, unit-6);
      drawEllie(cx, ey, unit);
    } else {
      // Both view
      const rx = state.zoom.bothX, ry = state.zoom.bothY;
      const unit = getSceneUnit(w, h, rx, ry);
      drawSkyGround(w, h, cy + unit/2);

      ctx.strokeStyle = '#00000010'; ctx.lineWidth = 0.5;
      for (let i = -rx; i <= rx; i++){
        ctx.beginPath(); ctx.moveTo(cx + i*unit, 0); ctx.lineTo(cx + i*unit, h); ctx.stroke();
      }
      for (let i = -ry; i <= ry; i++){
        ctx.beginPath(); ctx.moveTo(0, cy - i*unit); ctx.lineTo(w, cy - i*unit); ctx.stroke();
      }

      drawStreetWorld(cx, cy - unit/2, unit, rx, true);
      const shaftX = drawElevatorWorld(cx, cy, unit, ry, true);

      const wx = cx + state.walker.animPos * unit;
      const ey = cy - state.ellie.animPos * unit;

      // Pegamole (non-quiz both mode — the find game)
      const pm = state.pegamole;
      if (state.mode !== 'quiz' && pm.active){
        const pmScreenX = cx + pm.x * unit;
        const pmScreenY = cy - pm.y * unit;
        drawPegamole(pmScreenX, pmScreenY, unit, pm.wingPhase, pm.celebrating);
      }

      // Quiz mode: Pegamole at the correct answer point (after answering)
      if (state.mode === 'quiz' && quiz.showPegamoleAtAnswer && quiz.pegamoleAnswerX !== null){
        const pmX = cx + quiz.pegamoleAnswerX * unit;
        const pmY = cy - quiz.pegamoleAnswerY * unit;
        const wph = (performance.now() / 200) % (Math.PI * 2);
        // Use quiz celebration state
        const isCelebrating = quiz.pegamoleCelebrating || false;
        if(isCelebrating && !state.pegamole.celebrateStart) state.pegamole.celebrateStart = quiz.pegamoleCelebrateStart;
        drawPegamole(pmX, pmY, unit, wph, isCelebrating);
        // Pegamole's coordinate label
        ctx.fillStyle = '#FFD700';
        ctx.font = `bold ${Math.max(10, unit*0.3)}px Fredoka`;
        ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
        ctx.fillText(`(${axl(quiz.pegamoleAnswerX)}, ${axl(quiz.pegamoleAnswerY)})`, pmX + unit*0.3, pmY - unit*0.25);
      }

      if (state.walker.pos !== 0 || state.ellie.pos !== 0){
        ctx.setLineDash([4, 3]); ctx.lineWidth = 2;
        ctx.strokeStyle = '#EAEAEA88';
        ctx.beginPath(); ctx.moveTo(wx, cy); ctx.lineTo(wx, ey); ctx.stroke();
        ctx.strokeStyle = '#FFD70088';
        ctx.beginPath(); ctx.moveTo(cx, ey); ctx.lineTo(wx, ey); ctx.stroke();
        ctx.setLineDash([]);

        if (!pm.active || pm.found || state.mode === 'quiz'){
          // Don't show red dot if Pegamole is showing
          if(!(state.mode === 'quiz' && quiz.showPegamoleAtAnswer)){
            ctx.fillStyle = '#ff4747';
            ctx.beginPath(); ctx.arc(wx, ey, unit*0.13, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.4; ctx.stroke();
          }
          // Walker/Ellie intersection coordinate label
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${Math.max(10, unit*0.27)}px Fredoka`;
          ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
          ctx.fillText(`(${axl(state.walker.pos)}, ${axl(state.ellie.pos)})`, wx + unit*0.18, ey - unit*0.1);
        }
      }

      drawWalker(wx, cy + unit*0.08, unit, state.walker.stepPhase, state.walker.lastDir);
      ctx.fillStyle = '#99999955';
      ctx.fillRect(shaftX+2, ey - unit/2+2, unit-4, unit-4);
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.2;
      ctx.strokeRect(shaftX+2, ey - unit/2+2, unit-4, unit-4);
      drawEllie(cx, ey, unit);
    }
  }
}

// ========== QUIZ ENGINE ==========
function ri(lo, hi){ return Math.floor(Math.random()*(hi-lo+1))+lo; }
function riNZ(lo, hi){ let n; do { n = ri(lo,hi); } while(n===0); return n; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
function makeChoices(correct, count=4){
  const choices = new Set([correct]);
  let tries = 0;
  while(choices.size < count && tries < 50){
    let c = correct + ri(-3,3);
    if(c !== correct) choices.add(c);
    tries++;
  }
  while(choices.size < count) choices.add(correct + choices.size * (Math.random()>0.5?1:-1));
  return shuffle([...choices]);
}
function makeChoicesStr(correct, pool){
  const choices = new Set([correct]);
  for(const p of shuffle([...pool])){ if(choices.size >= 4) break; if(p !== correct) choices.add(p); }
  return shuffle([...choices]);
}

const quizTopics = [
  {
    id:'walk_basic', emoji:'🚶', name:'Where does Walker end up?',
    desc:'Walk forward or backward from a position',
    gen(){
      const start = ri(-7,7);
      const steps = ri(1,8);
      const fwd = Math.random()>0.5;
      const answer = fwd ? start + steps : start - steps;
      const dir = fwd ? 'forward' : 'backward';
      const fromText = start === 0 ? 'home (0)' : axl(start);
      return {
        prompt:`Walker is at ${fromText} and walks ${steps} step${steps!==1?'s':''} ${dir}. Where is he?`,
        answer, choices:makeChoices(answer), hint:`Forward = positive (+), backward = negative (−). Start at ${axl(start)} and count ${steps} ${dir}.`,
        viz:'street',
        vizStart:{walker:start, ellie:0},
        vizEnd:{walker:answer}
      };
    }
  },
  {
    id:'cross_zero', emoji:'🔄', name:'Crossing zero',
    desc:'Walk from a position and cross home',
    gen(){
      const start = riNZ(-8,8);
      const steps = ri(Math.abs(start)+1, Math.abs(start)+5);
      const backward = start > 0;
      const answer = backward ? start - steps : start + steps;
      const dir = backward ? 'backward' : 'forward';
      return {
        prompt:`Walker is at ${axl(start)}. He walks ${steps} steps ${dir}. Where does he end up?`,
        answer, choices:makeChoices(answer), hint:`He passes right through home (0) and keeps going!`,
        viz:'street',
        vizStart:{walker:start, ellie:0},
        vizEnd:{walker:answer}
      };
    }
  },
  {
    id:'further_from_home', emoji:'📏', name:'Who\'s further from home?',
    desc:'Compare distances regardless of direction',
    gen(){
      const a = riNZ(-9,9);
      let b; do { b = riNZ(-9,9); } while(Math.abs(b)===Math.abs(a));
      const aAbs = Math.abs(a), bAbs = Math.abs(b);

      // Randomly pick which two characters are being compared
      const matchup = ri(0,2); // 0=Walker vs Pegamole, 1=Ellie vs Pegamole, 2=Walker vs Ellie
      let char1, char2, viz, vizStart, vizEnd;

      if(matchup === 0){
        char1 = 'Walker'; char2 = 'Pegamole';
        viz = 'street';
        vizStart = {walker:a, ellie:0, pegamoleX:b};
        vizEnd = {walker:a, pegamoleX:b};
      } else if(matchup === 1){
        char1 = 'Ellie'; char2 = 'Pegamole';
        viz = 'elevator';
        vizStart = {walker:0, ellie:a};
        vizEnd = {ellie:a};
      } else {
        char1 = 'Walker'; char2 = 'Ellie';
        viz = 'both';
        vizStart = {walker:a, ellie:b};
        vizEnd = {walker:a, ellie:b};
      }

      const winnerPos = aAbs > bAbs ? a : b;
      const winnerName = aAbs > bAbs ? char1 : char2;
      const answer = winnerName;

      return {
        prompt:`${char1} is at ${axl(a)}. ${char2} is at ${axl(b)}. Who's further from home?`,
        answer, choices:shuffle([char1, char2]), choicesAreStrings:true,
        hint:`Ignore the + or −. Count how many steps from zero. ${axl(a)} is ${aAbs} away, ${axl(b)} is ${bAbs} away.`,
        viz,
        vizStart,
        vizEnd,
        showPegamoleOnStreet: matchup === 0, pegamoleLabel:true
      };
    }
  },
  {
    id:'how_far_apart', emoji:'↔️', name:'How far apart?',
    desc:'Distance between two positions',
    gen(){
      const a = ri(-8,8);
      let b; do { b = ri(-8,8); } while(b===a);
      const answer = Math.abs(a-b);
      // Generate plausible wrong answers: nearby positive integers
      const choices = new Set([answer]);
      // Common mistakes: just adding, just subtracting, off by one
      [Math.abs(a) + Math.abs(b), Math.abs(Math.abs(a) - Math.abs(b)), answer + 1, answer - 1, answer + 2].forEach(c => {
        if(c > 0 && c !== answer) choices.add(c);
      });
      // Fill to 4 if needed
      let fill = 1;
      while(choices.size < 4){ choices.add(answer + fill + 1); fill++; }
      return {
        prompt:`Walker is at ${axl(a)}. Pegamole is at ${axl(b)}. How many steps between them?`,
        answer, choices:shuffle([...choices].slice(0,4)),
        hint:`Count the steps from one to the other — direction doesn't matter for distance.`,
        viz:'street',
        vizStart:{walker:a, ellie:0, pegamoleX:b},
        vizEnd:{walker:a, pegamoleX:b},
        showPegamoleOnStreet:true, showDistanceBracket:true, distanceAnswer:answer,
        distA:a, distB:b
      };
    }
  },
  {
    id:'elevator_basic', emoji:'🛗', name:'Ellie\'s elevator',
    desc:'Ride up or down from a floor',
    gen(){
      const start = ri(-7,7);
      const ride = riNZ(-5,5);
      const answer = start + ride;
      const dir = ride > 0 ? 'up' : 'down';
      return {
        prompt:`Ellie is on floor ${axl(start)}. She rides ${dir} ${Math.abs(ride)} floor${Math.abs(ride)!==1?'s':''}. What floor is she on now?`,
        answer, choices:makeChoices(answer), hint:`Up = add, down = subtract.`,
        viz:'elevator',
        vizStart:{walker:0, ellie:start},
        vizEnd:{ellie:answer}
      };
    }
  },
  {
    id:'find_point', emoji:'📍', name:'Find the point',
    desc:'Walker walks, Ellie rides — where is Pegamole?',
    gen(){
      const x = riNZ(-8,8), y = riNZ(-8,8);
      const xDir = x > 0 ? 'forward' : 'backward';
      const yDir = y > 0 ? 'up' : 'down';
      const answer = `(${axl(x)}, ${axl(y)})`;
      const wrong1 = `(${axl(y)}, ${axl(x)})`;
      const wrong2 = `(${axl(-x)}, ${axl(y)})`;
      const wrong3 = `(${axl(x)}, ${axl(-y)})`;
      return {
        prompt:`Walker walks ${Math.abs(x)} step${Math.abs(x)!==1?'s':''} ${xDir}. Ellie rides ${Math.abs(y)} floor${Math.abs(y)!==1?'s':''} ${yDir}. Where is Pegamole?`,
        answer, choices:shuffle([...new Set([answer, wrong1, wrong2, wrong3])]).slice(0,4),
        choicesAreStrings:true,
        hint:`Forward = +, backward = −. Up = +, down = −. The point is (${axl(x)}, ${axl(y)}).`,
        viz:'both',
        vizStart:{walker:0, ellie:0},
        vizEnd:{walker:x, ellie:y},
        showPegamoleAtAnswer:true,
        pegamoleAnswerX:x, pegamoleAnswerY:y
      };
    }
  },
  {
    id:'above_or_below', emoji:'🌍', name:'Above or below ground?',
    desc:'Figure out which quadrant a point is in',
    gen(){
      const x = riNZ(-9,9), y = riNZ(-9,9);
      const horiz = x > 0 ? 'right of home' : 'left of home';
      const vert = y > 0 ? 'above ground' : 'below ground';
      const answer = `${vert}, ${horiz}`;
      const choices = shuffle([
        'above ground, right of home',
        'above ground, left of home',
        'below ground, right of home',
        'below ground, left of home'
      ]);
      return {
        prompt:`Pegamole is at (${axl(x)}, ${axl(y)}). Is he above or below ground? Left or right of home?`,
        answer, choices, choicesAreStrings:true,
        hint:`Positive y = above ground. Positive x = right of home.`,
        viz:'both',
        vizStart:{walker:0, ellie:0},
        vizEnd:{walker:x, ellie:y},
        showPegamoleAtAnswer:true,
        pegamoleAnswerX:x, pegamoleAnswerY:y
      };
    }
  },
  {
    id:'reflection', emoji:'🪞', name:'Mirror image',
    desc:'Reflect across an axis',
    gen(){
      const x = riNZ(-7,7), y = riNZ(-7,7);
      const flipY = Math.random()>0.5;
      let answer, prompt;
      if(flipY){
        answer = `(${axl(x)}, ${axl(-y)})`;
        const context = y > 0 ? 'burrowing underground to the same depth' : 'flying up to the same height';
        prompt = `Pegamole is at (${axl(x)}, ${axl(y)}). He ${context}. What are his new coordinates?`;
      } else {
        answer = `(${axl(-x)}, ${axl(y)})`;
        const context = x > 0 ? 'to the same distance left of home' : 'to the same distance right of home';
        prompt = `Pegamole is at (${axl(x)}, ${axl(y)}). He moves ${context}. New coordinates?`;
      }
      const wrong1 = `(${axl(-x)}, ${axl(-y)})`;
      const wrong2 = `(${axl(x)}, ${axl(y)})`;
      const wrong3 = flipY ? `(${axl(-x)}, ${axl(y)})` : `(${axl(x)}, ${axl(-y)})`;
      return {
        prompt, answer, choices:shuffle([...new Set([answer,wrong1,wrong2,wrong3])]).slice(0,4),
        choicesAreStrings:true,
        hint:flipY ? `Only the floor (y) changes sign — the street position stays the same.`
                    : `Only the street position (x) changes sign — the floor stays the same.`,
        viz:'both',
        vizStart:{walker:x, ellie:y},
        vizEnd:{walker: flipY?x:-x, ellie: flipY?-y:y}
      };
    }
  },
  {
    id:'return_trip', emoji:'🏠', name:'How far from home?',
    desc:'Steps needed to return to zero',
    gen(){
      const pos = riNZ(-9,9);
      const answer = Math.abs(pos);
      const who = Math.random()>0.5 ? 'Walker' : 'Ellie';
      const where = who === 'Walker' ? `at position ${axl(pos)}` : `on floor ${axl(pos)}`;
      const isW = who==='Walker';
      return {
        prompt:`${who} is ${where}. How many steps to get home?`,
        answer, choices:makeChoices(answer).map(c=>Math.abs(c)||1),
        hint:`Count the steps from ${axl(pos)} back to 0. Direction doesn't matter — just the distance.`,
        viz: isW?'street':'elevator',
        vizStart: isW?{walker:pos, ellie:0}:{walker:0, ellie:pos},
        vizEnd: isW?{walker:0}:{ellie:0}
      };
    }
  },
  {
    id:'multi_step', emoji:'🔢', name:'Multi-step journey',
    desc:'Follow multiple moves and find the end',
    gen(){
      const who = Math.random()>0.5 ? 'Walker' : 'Ellie';
      const isW = who==='Walker';
      const start = ri(-5,5);
      const m1 = riNZ(-5,5), m2 = riNZ(-5,5), m3 = riNZ(-4,4);
      const answer = start + m1 + m2 + m3;
      function desc(n){
        if(isW) return n>0 ? `${n} steps forward` : `${-n} steps backward`;
        return n>0 ? `${n} floors up` : `${-n} floors down`;
      }
      const fromText = start === 0 ? 'home (0)' : axl(start);
      return {
        prompt:`${who} starts at ${fromText}. Goes ${desc(m1)}, then ${desc(m2)}, then ${desc(m3)}. Where does ${isW?'he':'she'} end up?`,
        answer, choices:makeChoices(answer),
        hint:`Step by step: ${axl(start)} ${m1>=0?'+ '+m1:'− '+(-m1)} ${m2>=0?'+ '+m2:'− '+(-m2)} ${m3>=0?'+ '+m3:'− '+(-m3)} = ${axl(answer)}`,
        viz: isW?'street':'elevator',
        vizStart: isW?{walker:start, ellie:0}:{walker:0, ellie:start},
        vizEnd: isW?{walker:answer}:{ellie:answer},
        multiStepJourney:true,
        journeyWho: isW?'walker':'ellie',
        journeyLegs:[m1, m2, m3],
        journeyStart:start
      };
    }
  }
];

// Quiz state
const quiz = {
  active: false,
  topicId: null,
  qNum: 0,
  total: 8,
  correct: 0,
  currentQ: null,
  answered: false,
  pegamoleX: null // for street-level pegamole display
};

function showTopicSelect(){
  quiz.active = false;
  quiz.pegamoleX = null;
  document.getElementById('quizActive').style.display = 'none';
  const container = document.getElementById('quizTopicSelect');
  container.style.display = '';
  container.innerHTML = quizTopics.map(t =>
    `<button class="topic-btn" onclick="startQuiz('${t.id}')">
      <span class="topic-emoji">${t.emoji}</span>${t.name}
      <br><span style="font-size:12px;font-weight:500;opacity:0.6;">${t.desc}</span>
    </button>`
  ).join('');
  // Reset positions
  state.walker.pos = 0; state.walker.animPos = 0;
  state.ellie.pos = 0; state.ellie.animPos = 0;
  draw();
}

function startQuiz(topicId){
  quiz.active = true;
  quiz.topicId = topicId;
  quiz.qNum = 0;
  quiz.correct = 0;
  quiz.total = 8;
  document.getElementById('quizTopicSelect').style.display = 'none';
  document.getElementById('quizActive').style.display = '';
  const topic = quizTopics.find(t=>t.id===topicId);
  document.getElementById('quizCategoryLabel').textContent = topic.emoji + ' ' + topic.name;
  quizNext();
}

function quizNext(){
  quiz.qNum++;
  if(quiz.qNum > quiz.total){
    const pct = Math.round(quiz.correct/quiz.total*100);
    document.getElementById('quizPrompt').textContent = '';
    document.getElementById('quizChoices').innerHTML = '';
    document.getElementById('quizFeedback').style.display = '';
    document.getElementById('quizFeedback').className = 'quiz-feedback ' + (pct >= 70 ? 'right' : 'wrong');
    document.getElementById('quizFeedback').innerHTML = pct >= 70
      ? `🎉 ${quiz.correct}/${quiz.total} correct (${pct}%)! Great job!`
      : `${quiz.correct}/${quiz.total} correct (${pct}%). Keep practicing!`;
    document.getElementById('quizNextBtn').style.display = '';
    document.getElementById('quizNextBtn').textContent = '← Back to Topics';
    document.getElementById('quizNextBtn').onclick = () => {
      document.getElementById('quizNextBtn').onclick = quizNext;
      showTopicSelect();
    };
    quiz.pegamoleX = null;
    return;
  }

  quiz.answered = false;
  const topic = quizTopics.find(t=>t.id===quiz.topicId);
  quiz.currentQ = topic.gen();
  const q = quiz.currentQ;

  // Update progress
  document.getElementById('quizProgressFill').style.width = `${((quiz.qNum-1)/quiz.total)*100}%`;
  document.getElementById('quizScoreText').textContent = `${quiz.correct}/${quiz.qNum-1}`;

  // Show question
  document.getElementById('quizPrompt').textContent = q.prompt;
  document.getElementById('quizFeedback').style.display = 'none';
  document.getElementById('quizNextBtn').style.display = 'none';
  document.getElementById('quizNextBtn').textContent = 'Next Question →';
  document.getElementById('quizNextBtn').onclick = quizNext;

  const isStr = q.choicesAreStrings;
  const choicesHTML = q.choices.map((c, i) => {
    const label = isStr ? c : axl(c);
    return `<button class="quiz-choice" onclick="quizAnswer(this, ${isStr ? `'${c.replace(/'/g,"\\'")}'` : c})">${label}</button>`;
  }).join('');
  document.getElementById('quizChoices').innerHTML = choicesHTML;

  // ---- PHASE 1: Snap to starting position (no animation) ----
  quiz.pegamoleX = q.vizStart.pegamoleX !== undefined ? q.vizStart.pegamoleX : (q.showPegamoleOnStreet ? q.vizStart.pegamoleX : null);
  if(q.vizStart.pegamoleX !== undefined) quiz.pegamoleX = q.vizStart.pegamoleX;
  else if(q.showPegamoleOnStreet && q.vizEnd.pegamoleX !== undefined) quiz.pegamoleX = q.vizEnd.pegamoleX;
  else quiz.pegamoleX = null;

  quiz.showDistanceBracket = false;
  quiz.showPegamoleAtAnswer = false;
  quiz.pegamoleAnswerX = null;
  quiz.pegamoleAnswerY = null;

  const ws = q.vizStart.walker !== undefined ? q.vizStart.walker : 0;
  const es = q.vizStart.ellie !== undefined ? q.vizStart.ellie : 0;
  state.walker.pos = ws;
  state.walker.animPos = ws;
  state.walker.animating = false;
  state.walker.stepPhase = 0;
  state.ellie.pos = es;
  state.ellie.animPos = es;
  state.ellie.animating = false;
  draw();
}

function quizAnswer(btn, value){
  if(quiz.answered) return;
  quiz.answered = true;
  const q = quiz.currentQ;
  const isStr = q.choicesAreStrings;
  const correct = isStr ? String(value) === String(q.answer) : value === q.answer;

  if(correct) quiz.correct++;

  // Highlight buttons
  const btns = document.querySelectorAll('.quiz-choice');
  btns.forEach(b => {
    b.disabled = true;
    const bVal = b.textContent;
    const aLabel = isStr ? q.answer : axl(q.answer);
    if(bVal === aLabel) b.classList.add('correct');
  });
  if(!correct) btn.classList.add('wrong');

  // Feedback — skip text for find_point, the viz shows it
  const fb = document.getElementById('quizFeedback');
  if(q.showPegamoleAtAnswer){
    fb.style.display = 'none';
  } else {
    fb.style.display = '';
    if(correct){
      fb.className = 'quiz-feedback right';
      fb.textContent = '✓ Correct!';
    } else {
      fb.className = 'quiz-feedback wrong';
      const aLabel = isStr ? q.answer : axl(q.answer);
      fb.innerHTML = `✗ The answer is <strong>${aLabel}</strong>. ${q.hint}`;
    }
  }

  document.getElementById('quizNextBtn').style.display = '';
  document.getElementById('quizScoreText').textContent = `${quiz.correct}/${quiz.qNum}`;
  document.getElementById('quizProgressFill').style.width = `${(quiz.qNum/quiz.total)*100}%`;

  // ---- PHASE 2: Animate to show the answer ----

  if(q.showPegamoleAtAnswer){
    // find_point and above_or_below: show Pegamole at correct point
    quiz.showPegamoleAtAnswer = true;
    quiz.pegamoleAnswerX = q.pegamoleAnswerX;
    quiz.pegamoleAnswerY = q.pegamoleAnswerY;
    quiz.pegamoleCelebrating = correct;
    if(correct) quiz.pegamoleCelebrateStart = performance.now();

    // For above_or_below: Walker/Ellie go to correct point (not student choice)
    // For find_point: Walker/Ellie go to student's chosen coordinate
    if(q.id === 'find_point' || (isStr && typeof value === 'string' && value.match(/\(/))){
      // Parse student's selected coordinate
      let selX = q.pegamoleAnswerX, selY = q.pegamoleAnswerY;
      if(typeof value === 'string'){
        const m = value.match(/\(([^,]+),\s*([^)]+)\)/);
        if(m){ selX = parseInt(m[1]); selY = parseInt(m[2]); }
      }
      state.walker.pos = selX;
      animateTo(state.walker, selX);
      state.ellie.pos = selY;
      animateTo(state.ellie, selY);
    } else {
      // above_or_below: just move to the correct point
      state.walker.pos = q.pegamoleAnswerX;
      animateTo(state.walker, q.pegamoleAnswerX);
      state.ellie.pos = q.pegamoleAnswerY;
      animateTo(state.ellie, q.pegamoleAnswerY);
    }

    if(correct){
      function celebLoop(){
        if(quiz.pegamoleCelebrating){ draw(); requestAnimationFrame(celebLoop); }
      }
      requestAnimationFrame(celebLoop);
      setTimeout(() => { quiz.pegamoleCelebrating = false; draw(); }, 2500);
    }
  } else if(q.multiStepJourney){
    // Multi-step: animate the full journey leg by leg
    const ch = q.journeyWho === 'walker' ? state.walker : state.ellie;
    multiStepAnimateTo(ch, q.journeyStart, q.journeyLegs);
  } else if(q.vizEnd){
    if(q.vizEnd.walker !== undefined){
      state.walker.pos = q.vizEnd.walker;
      animateTo(state.walker, q.vizEnd.walker);
    }
    if(q.vizEnd.ellie !== undefined){
      state.ellie.pos = q.vizEnd.ellie;
      animateTo(state.ellie, q.vizEnd.ellie);
    }
  }

  // Show distance bracket after answer for distance questions
  if(q.showDistanceBracket) quiz.showDistanceBracket = true;

  draw();
}
