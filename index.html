<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Line Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Fredoka', sans-serif;
    background: #2A2A3A;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  .top-bar {
    display: flex;
    gap: 4px;
    padding: 6px 8px;
    background: #2A2A3A;
  }

  .tab {
    flex: 1;
    padding: 7px 10px;
    border: none;
    border-radius: 8px;
    font-family: 'Fredoka', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: #fff7;
    background: #3A3A4A;
  }
  .tab.active { background: #555570; color: #fff; }
  .tab:hover:not(.active) { background: #44445A; }

  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Left side panel: controls */
  .side-panel {
    width: 100px;
    background: #333348;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 6px;
    gap: 8px;
    flex-shrink: 0;
  }

  .pos-box {
    background: #2A2A3A;
    border-radius: 10px;
    padding: 6px 8px;
    text-align: center;
    width: 88px;
  }
  .pos-box .label {
    font-size: 10px;
    color: #fff7;
    font-weight: 500;
  }
  .pos-box .value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }

  .ctrl-btn {
    width: 80px;
    height: 38px;
    border: none;
    border-radius: 8px;
    font-family: 'Fredoka', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    transition: all 0.12s;
    color: #fff;
  }
  .ctrl-btn.pos { background: #4CAF50; }
  .ctrl-btn.pos:hover { background: #5CBF60; }
  .ctrl-btn.pos:active { background: #3C9F40; transform: scale(0.95); }
  .ctrl-btn.neg { background: #E05555; }
  .ctrl-btn.neg:hover { background: #F06565; }
  .ctrl-btn.neg:active { background: #D04545; transform: scale(0.95); }

  .home-btn {
    width: 42px; height: 42px;
    border: none; border-radius: 50%;
    background: #5A5A7A; color: #fff;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
    margin-top: 4px;
  }
  .home-btn:hover { background: #6A6A8A; }
  .home-btn:active { transform: scale(0.95); }

  .info-text {
    font-size: 11px;
    color: #fff8;
    text-align: center;
    line-height: 1.3;
    margin-top: auto;
    padding: 4px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: #ffffff20;
    margin: 2px 0;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: #fff5;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Canvas area */
  .canvas-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .tab-view { display: none; width: 100%; height: 100%; }
  .tab-view.active { display: flex; }
</style>
</head>
<body>

<div class="top-bar">
  <button class="tab active" onclick="switchTab(0)">🚶 Walker's Street</button>
  <button class="tab" onclick="switchTab(1)">🛗 Ellie's Elevator</button>
  <button class="tab" onclick="switchTab(2)">📍 Graph</button>
</div>

<div class="main">
  <div class="tab-view active" id="tab0">
    <div class="side-panel">
      <div class="pos-box">
        <div class="label">Position</div>
        <div class="value" id="pos0">0</div>
      </div>
      <button class="ctrl-btn pos" onclick="move(0,1)">▶ +1</button>
      <button class="ctrl-btn neg" onclick="move(0,-1)">◀ −1</button>
      <button class="home-btn" onclick="goHome(0)">🏠</button>
      <div class="info-text" id="info0">Walker is home!</div>
    </div>
    <div class="canvas-area"><canvas id="canvas0"></canvas></div>
  </div>

  <div class="tab-view" id="tab1">
    <div class="side-panel">
      <div class="pos-box">
        <div class="label">Floor</div>
        <div class="value" id="pos1">0</div>
      </div>
      <button class="ctrl-btn pos" onclick="move(1,1)">▲ +1</button>
      <button class="ctrl-btn neg" onclick="move(1,-1)">▼ −1</button>
      <button class="home-btn" onclick="goHome(1)">🏠</button>
      <div class="info-text" id="info1">Ellie is on the ground floor!</div>
    </div>
    <div class="canvas-area"><canvas id="canvas1"></canvas></div>
  </div>

  <div class="tab-view" id="tab2">
    <div class="side-panel">
      <div class="section-label">Walker</div>
      <div class="pos-box" style="margin-bottom:2px;">
        <div class="label">X Position</div>
        <div class="value" id="pos2x">0</div>
      </div>
      <button class="ctrl-btn pos" onclick="move(2,1,'x')" style="height:32px;font-size:13px;">▶ +1</button>
      <button class="ctrl-btn neg" onclick="move(2,-1,'x')" style="height:32px;font-size:13px;">◀ −1</button>
      <div class="divider"></div>
      <div class="section-label">Ellie</div>
      <div class="pos-box" style="margin-bottom:2px;">
        <div class="label">Y Floor</div>
        <div class="value" id="pos2y">0</div>
      </div>
      <button class="ctrl-btn pos" onclick="move(2,1,'y')" style="height:32px;font-size:13px;">▲ +1</button>
      <button class="ctrl-btn neg" onclick="move(2,-1,'y')" style="height:32px;font-size:13px;">▼ −1</button>
      <div class="divider"></div>
      <div class="pos-box">
        <div class="label">Point</div>
        <div class="value" id="pos2pt" style="font-size:16px;">(0, 0)</div>
      </div>
      <button class="home-btn" onclick="goHome(2)">🏠</button>
    </div>
    <div class="canvas-area"><canvas id="canvas2"></canvas></div>
  </div>
</div>

<script>
const MAX = 10;
const state = {
  tab: 0,
  walker:  { pos: 0, animPos: 0, animating: false, stepPhase: 0, lastDir: 1 },
  ellie:   { pos: 0, animPos: 0, animating: false },
  walker2: { pos: 0, animPos: 0, animating: false, stepPhase: 0, lastDir: 1 },
  ellie2:  { pos: 0, animPos: 0, animating: false },
};

const canvases = [], ctxs = [];

function initCanvases() {
  for (let i = 0; i < 3; i++) {
    const c = document.getElementById('canvas' + i);
    canvases.push(c);
    ctxs.push(c.getContext('2d'));
  }
  resize();
  window.addEventListener('resize', resize);
}

function resize() {
  canvases.forEach(c => {
    const p = c.parentElement;
    if (!p) return;
    const dpr = window.devicePixelRatio || 1;
    c.width = p.clientWidth * dpr;
    c.height = p.clientHeight * dpr;
    c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
    c.style.width = p.clientWidth + 'px';
    c.style.height = p.clientHeight + 'px';
  });
  draw();
}

function switchTab(idx) {
  state.tab = idx;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-view').forEach((v, i) => v.classList.toggle('active', i === idx));
  setTimeout(resize, 20);
}

function dims(canvas) {
  const dpr = window.devicePixelRatio || 1;
  return { w: canvas.width / dpr, h: canvas.height / dpr };
}

// ========== MOVEMENT ==========
function getChar(tab, axis) {
  if (tab === 0) return state.walker;
  if (tab === 1) return state.ellie;
  return axis === 'y' ? state.ellie2 : state.walker2;
}

function move(tab, dir, axis) {
  const ch = getChar(tab, axis);
  if (ch.animating) return;
  const newPos = ch.pos + dir;
  if (newPos < -MAX || newPos > MAX) return;

  ch.animating = true;
  ch.pos = newPos;
  if (ch.lastDir !== undefined) ch.lastDir = dir;
  updateUI(tab, axis);

  const startPos = ch.animPos;
  const endPos = newPos;
  const startTime = performance.now();
  const duration = 400;

  function animate(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    ch.animPos = startPos + (endPos - startPos) * ease;
    if (ch.stepPhase !== undefined) ch.stepPhase = Math.sin(t * Math.PI);
    draw();
    if (t < 1) requestAnimationFrame(animate);
    else {
      ch.animPos = endPos;
      ch.animating = false;
      if (ch.stepPhase !== undefined) ch.stepPhase = 0;
      draw();
    }
  }
  requestAnimationFrame(animate);
}

function goHome(tab) {
  if (tab === 2) {
    doAnimateTo(state.walker2, 0);
    doAnimateTo(state.ellie2, 0);
    state.walker2.pos = 0; state.ellie2.pos = 0;
    updateUI(2, 'x'); updateUI(2, 'y');
  } else {
    const ch = getChar(tab);
    doAnimateTo(ch, 0);
    ch.pos = 0;
    updateUI(tab);
  }
}

function doAnimateTo(ch, target) {
  if (ch.animating) return;
  ch.animating = true;
  if (ch.lastDir !== undefined) ch.lastDir = target > ch.animPos ? 1 : -1;
  const startPos = ch.animPos;
  const startTime = performance.now();
  const dist = Math.abs(target - startPos);
  const duration = Math.min(900, 200 + dist * 70);
  function animate(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    ch.animPos = startPos + (target - startPos) * ease;
    if (ch.stepPhase !== undefined) ch.stepPhase = Math.abs(Math.sin(t * Math.PI * Math.max(1, dist)));
    draw();
    if (t < 1) requestAnimationFrame(animate);
    else {
      ch.animPos = target;
      ch.animating = false;
      if (ch.stepPhase !== undefined) ch.stepPhase = 0;
      draw();
    }
  }
  requestAnimationFrame(animate);
}

function fp(p) { return p === 0 ? '0' : (p > 0 ? '+' + p : '' + p); }

function updateUI(tab, axis) {
  if (tab === 0) {
    const p = state.walker.pos;
    document.getElementById('pos0').textContent = fp(p);
    document.getElementById('info0').textContent = p === 0 ? "Walker is home!" :
      p > 0 ? `${p} step${p !== 1 ? 's' : ''} forward` :
      `${-p} step${-p !== 1 ? 's' : ''} backward`;
  } else if (tab === 1) {
    const p = state.ellie.pos;
    document.getElementById('pos1').textContent = fp(p);
    document.getElementById('info1').textContent = p === 0 ? "Ground floor!" :
      p > 0 ? `Floor +${p}` : `Basement ${p}`;
  } else {
    if (!axis || axis === 'x') document.getElementById('pos2x').textContent = fp(state.walker2.pos);
    if (!axis || axis === 'y') document.getElementById('pos2y').textContent = fp(state.ellie2.pos);
    document.getElementById('pos2pt').textContent = `(${fp(state.walker2.pos)}, ${fp(state.ellie2.pos)})`;
  }
}

// ========== DRAWING ==========
function draw() {
  const t = state.tab;
  if (t === 0) drawStreet(ctxs[0], canvases[0], state.walker);
  else if (t === 1) drawElevator(ctxs[1], canvases[1], state.ellie);
  else drawCombined(ctxs[2], canvases[2], state.walker2, state.ellie2);
}

// ===== WALKER: Simplified clean-line icon based on image_0.png, backward walk =====
function drawWalker(ctx, cx, cy, unit, legPhase, moveDir) {
  const s = unit * 0.88;
  ctx.save();
  ctx.translate(cx, cy);
  // Character always faces right. Leg logic creates moonwalk look. NO ctx.scale().
  ctx.fillStyle = '#EAEAEA';
  ctx.strokeStyle = '#EAEAEA';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Head (clean circle, no features)
  const headR = s * 0.11;
  const headCY = -s * 0.42;
  ctx.beginPath();
  ctx.arc(0, headCY, headR, 0, Math.PI * 2);
  ctx.fill();

  // Torso (clean trapezoid form)
  const shoulderY = headCY + headR + s * 0.01;
  const hipY = -s * 0.15;
  const dressBottom = s * 0.0;
  const shoulderW = s * 0.1;
  const dressW = s * 0.1;

  ctx.beginPath();
  ctx.moveTo(-shoulderW, shoulderY);
  ctx.lineTo(shoulderW, shoulderY);
  ctx.lineTo(dressW, hipY);
  ctx.lineTo(-dressW, hipY);
  ctx.closePath();
  ctx.fill();

  // Arms (fixed clean strokes, matching image pose, always facing right)
  const armW = Math.max(2.5, s * 0.06);
  ctx.lineWidth = armW;
  // Front arm (matching the icon's clean pose)
  ctx.beginPath();
  ctx.moveTo(shoulderW, shoulderY + s * 0.02);
  ctx.lineTo(s * 0.1, shoulderY + s * 0.2);
  ctx.stroke();
  // Back arm (matching the icon's clean pose)
  ctx.beginPath();
  ctx.moveTo(-shoulderW, shoulderY + s * 0.02);
  ctx.lineTo(-s * 0.1, shoulderY + s * 0.25);
  ctx.stroke();

  // Legs (animated, but always from fixed hips to create a moonwalk look when moving -1)
  const legW = Math.max(3, s * 0.08);
  ctx.lineWidth = legW;
  const animationRange = s * 0.22;
  const stride = legPhase * animationRange * moveDir;
  
  // Front leg (angles forward from character's center)
  ctx.beginPath();
  ctx.moveTo(s * 0.03, hipY);
  ctx.lineTo(s * 0.2 + stride, hipY + s * 0.3);
  ctx.stroke();
  // Back leg (angles backward from character's center)
  ctx.beginPath();
  ctx.moveTo(-s * 0.03, hipY);
  ctx.lineTo(-s * 0.1 - stride, hipY + s * 0.35);
  ctx.stroke();

  ctx.restore();
}

// ===== ELLIE: Women's restroom silhouette =====
function drawEllie(ctx, cx, cy, unit) {
  const s = unit * 0.85;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = '#FFD700';
  ctx.strokeStyle = '#FFD700';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Head
  const headR = s * 0.1;
  const headCY = -s * 0.42;
  ctx.beginPath();
  ctx.arc(0, headCY, headR, 0, Math.PI * 2);
  ctx.fill();

  // Body/dress — A-line trapezoid shape like the restroom sign
  const shoulderY = headCY + headR + s * 0.01;
  const dressBottom = s * 0.12;
  const shoulderW = s * 0.1;
  const dressW = s * 0.2;

  ctx.beginPath();
  ctx.moveTo(-shoulderW, shoulderY);
  ctx.lineTo(shoulderW, shoulderY);
  ctx.lineTo(dressW, dressBottom);
  ctx.lineTo(-dressW, dressBottom);
  ctx.closePath();
  ctx.fill();

  // Arms at sides (slightly out, like restroom figure)
  const armW = Math.max(2, s * 0.055);
  ctx.lineWidth = armW;
  // Left arm
  ctx.beginPath();
  ctx.moveTo(-shoulderW, shoulderY + s * 0.02);
  ctx.lineTo(-s * 0.18, shoulderY + s * 0.17);
  ctx.stroke();
  // Right arm
  ctx.beginPath();
  ctx.moveTo(shoulderW, shoulderY + s * 0.02);
  ctx.lineTo(s * 0.18, shoulderY + s * 0.17);
  ctx.stroke();

  // Legs (straight, visible below dress)
  const legW = Math.max(2.5, s * 0.06);
  ctx.lineWidth = legW;
  ctx.beginPath();
  ctx.moveTo(-s * 0.06, dressBottom);
  ctx.lineTo(-s * 0.07, dressBottom + s * 0.25);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s * 0.06, dressBottom);
  ctx.lineTo(s * 0.07, dressBottom + s * 0.25);
  ctx.stroke();

  ctx.restore();
}

// ===== HOUSE (ground floor only, no roof) =====
function drawGroundFloor(ctx, x, y, w, h) {
  // Ground floor is a distinct warm green/teal
  ctx.fillStyle = '#3D8B6E';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#2D6B4E';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, h);

  // Door
  ctx.fillStyle = '#6B4226';
  const dw = w * 0.28, dh = h * 0.42;
  ctx.fillRect(x + w / 2 - dw / 2, y + h - dh, dw, dh);
  ctx.fillStyle = '#C4A265';
  ctx.beginPath();
  ctx.arc(x + w / 2 + dw * 0.22, y + h - dh / 2, Math.max(1.5, w * 0.025), 0, Math.PI * 2);
  ctx.fill();

  // Window
  const ws = w * 0.2;
  ctx.fillStyle = '#ADE0F7';
  ctx.fillRect(x + w / 2 - ws / 2, y + h * 0.15, ws, ws);
  ctx.strokeStyle = '#2D6B4E';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + w / 2 - ws / 2, y + h * 0.15, ws, ws);

  // "0" above
  ctx.fillStyle = '#ffffffcc';
  ctx.font = `bold ${Math.max(10, w * 0.3)}px Fredoka`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('0', x + w / 2, y - 2);
}

// ===== HOUSE for street view (with roof) =====
function drawHouseWithRoof(ctx, x, y, w, h) {
  // Wall
  ctx.fillStyle = '#3D8B6E';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#2D6B4E';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, h);

  // Roof
  const roofH = h * 0.3;
  ctx.fillStyle = '#8B3A2F';
  ctx.beginPath();
  ctx.moveTo(x - w * 0.1, y);
  ctx.lineTo(x + w / 2, y - roofH);
  ctx.lineTo(x + w * 1.1, y);
  ctx.closePath();
  ctx.fill();

  // Door
  ctx.fillStyle = '#6B4226';
  const dw = w * 0.26, dh = h * 0.4;
  ctx.fillRect(x + w / 2 - dw / 2, y + h - dh, dw, dh);
  ctx.fillStyle = '#C4A265';
  ctx.beginPath();
  ctx.arc(x + w / 2 + dw * 0.22, y + h - dh / 2, Math.max(1.5, w * 0.025), 0, Math.PI * 2);
  ctx.fill();

  // Window
  const ws = w * 0.2;
  ctx.fillStyle = '#ADE0F7';
  ctx.fillRect(x + w / 2 - ws / 2, y + h * 0.15, ws, ws);

  // "0"
  ctx.fillStyle = '#ffffffcc';
  ctx.font = `bold ${Math.max(10, w * 0.3)}px Fredoka`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('0', x + w / 2, y - roofH - 1);
}

// ===== TAB 0: STREET =====
function drawStreet(ctx, canvas, walker) {
  const { w, h } = dims(canvas);
  const unit = Math.min(w / 23, h / 5, 44);
  const roadH = unit;
  const cx = w / 2;
  const roadY = h / 2 - roadH / 2;

  // Sky
  ctx.fillStyle = '#87CEEB';
  ctx.fillRect(0, 0, w, roadY);

  // Grass strip (1 unit tall above road)
  ctx.fillStyle = '#5A9E3E';
  ctx.fillRect(0, roadY - unit, w, unit);

  // Ground below road
  ctx.fillStyle = '#C4A265';
  ctx.fillRect(0, roadY + roadH, w, h - roadY - roadH);

  // Road
  ctx.fillStyle = '#555';
  ctx.fillRect(0, roadY, w, roadH);

  // Yellow dashes
  ctx.fillStyle = '#E8C840';
  for (let i = -MAX; i <= MAX; i++) {
    if (i === 0) continue;
    if (Math.abs(i) % 2 === 0) {
      const dx = cx + i * unit - unit / 2;
      ctx.fillRect(dx + unit * 0.08, roadY + roadH * 0.43, unit * 0.84, roadH * 0.14);
    }
  }

  // Number labels below road
  ctx.font = `bold ${Math.max(9, unit * 0.28)}px Fredoka`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let i = -MAX; i <= MAX; i++) {
    if (i === 0) continue;
    ctx.fillStyle = i > 0 ? '#3A7D3E' : '#B04040';
    ctx.fillText(fp(i), cx + i * unit, roadY + roadH + 3);
  }

  // House at origin (with roof)
  drawHouseWithRoof(ctx, cx - unit / 2, roadY, unit, roadH);

  // Walker
  const walkerX = cx + walker.animPos * unit;
  const walkerY = roadY + roadH / 2 + unit * 0.08;
  drawWalker(ctx, walkerX, walkerY, unit, walker.stepPhase || 0, walker.lastDir || 1);
}

// ===== TAB 1: ELEVATOR =====
function drawElevator(ctx, canvas, ellie) {
  const { w, h } = dims(canvas);
  // Use as much vertical space as possible
  const unit = Math.min(w / 5, (h - 20) / (MAX * 2 + 3), 40);
  const cx = w / 2;
  const cy = h / 2;
  const groundLine = cy + unit / 2;

  // Sky
  ctx.fillStyle = '#87CEEB';
  ctx.fillRect(0, 0, w, groundLine);

  // Ground
  ctx.fillStyle = '#C4A265';
  ctx.fillRect(0, groundLine, w, h - groundLine);

  // Road context band
  ctx.fillStyle = '#55555533';
  ctx.fillRect(0, cy - unit / 2, w, unit);

  // Shaft
  const shaftX = cx - unit / 2;

  // Draw floors
  for (let i = -MAX; i <= MAX; i++) {
    const fy = cy - i * unit - unit / 2;
    if (fy > h + unit || fy < -unit) continue;

    if (i === 0) {
      // Ground floor — drawn separately below
      continue;
    } else if (i > 0) {
      // Above ground floors
      ctx.fillStyle = '#D4594A';
      ctx.fillRect(shaftX, fy, unit, unit);
      ctx.strokeStyle = '#B03A2F';
      ctx.lineWidth = 0.7;
      ctx.strokeRect(shaftX, fy, unit, unit);
      // Window
      const ws = unit * 0.18;
      ctx.fillStyle = '#ADE0F7';
      ctx.fillRect(shaftX + unit / 2 - ws / 2, fy + unit * 0.35, ws, ws);
    } else {
      // Basement floors
      ctx.fillStyle = '#7A6050';
      ctx.fillRect(shaftX, fy, unit, unit);
      ctx.strokeStyle = '#5A4030';
      ctx.lineWidth = 0.7;
      ctx.strokeRect(shaftX, fy, unit, unit);
    }

    // Floor labels
    ctx.fillStyle = i > 0 ? '#3A7D3E' : '#B04040';
    ctx.font = `bold ${Math.max(9, unit * 0.27)}px Fredoka`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(fp(i), shaftX + unit + 5, fy + unit / 2);
  }

  // Roof at very top only
  const topY = cy - MAX * unit - unit / 2;
  ctx.fillStyle = '#8B3A2F';
  ctx.beginPath();
  ctx.moveTo(shaftX - unit * 0.12, topY);
  ctx.lineTo(cx, topY - unit * 0.4);
  ctx.lineTo(shaftX + unit * 1.12, topY);
  ctx.closePath();
  ctx.fill();

  // Ground floor (distinct color, no roof)
  drawGroundFloor(ctx, shaftX, cy - unit / 2, unit, unit);

  // Elevator tracks
  ctx.strokeStyle = '#00000018';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(shaftX + 3, topY);
  ctx.lineTo(shaftX + 3, cy + MAX * unit + unit);
  ctx.moveTo(shaftX + unit - 3, topY);
  ctx.lineTo(shaftX + unit - 3, cy + MAX * unit + unit);
  ctx.stroke();

  // Elevator car
  const elevY = cy - ellie.animPos * unit;
  ctx.fillStyle = '#99999955';
  ctx.fillRect(shaftX + 3, elevY - unit / 2 + 3, unit - 6, unit - 6);
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(shaftX + 3, elevY - unit / 2 + 3, unit - 6, unit - 6);

  // Ellie
  drawEllie(ctx, cx, elevY, unit);
}

// ===== TAB 2: COMBINED =====
function drawCombined(ctx, canvas, walker, ellie) {
  const { w, h } = dims(canvas);
  const unit = Math.min(w / 23, h / 23, 34);
  const cx = w / 2;
  const cy = h / 2;

  // Sky
  ctx.fillStyle = '#87CEEB';
  ctx.fillRect(0, 0, w, cy + unit / 2);
  // Ground
  ctx.fillStyle = '#C4A265';
  ctx.fillRect(0, cy + unit / 2, w, h - cy - unit / 2);

  // Grid
  ctx.strokeStyle = '#00000010';
  ctx.lineWidth = 0.5;
  for (let i = -MAX; i <= MAX; i++) {
    ctx.beginPath(); ctx.moveTo(cx + i * unit, 0); ctx.lineTo(cx + i * unit, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy - i * unit); ctx.lineTo(w, cy - i * unit); ctx.stroke();
  }

  // Road band
  ctx.fillStyle = '#55555544';
  ctx.fillRect(0, cy - unit / 2, w, unit);

  // Yellow dashes
  ctx.fillStyle = '#E8C84044';
  for (let i = -MAX; i <= MAX; i++) {
    if (i === 0 || Math.abs(i) % 2 !== 0) continue;
    ctx.fillRect(cx + i * unit - unit / 2 + unit * 0.08, cy - unit * 0.07, unit * 0.84, unit * 0.14);
  }

  // Shaft floors
  const shaftX = cx - unit / 2;
  for (let i = -MAX; i <= MAX; i++) {
    if (i === 0) continue;
    const fy = cy - i * unit - unit / 2;
    if (fy > h + unit || fy < -unit) continue;
    ctx.fillStyle = i > 0 ? '#D4594A1A' : '#7A60501A';
    ctx.fillRect(shaftX, fy, unit, unit);
  }

  // Axis labels
  ctx.font = `bold ${Math.max(7, unit * 0.24)}px Fredoka`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let i = -MAX; i <= MAX; i++) {
    if (i === 0) continue;
    ctx.fillStyle = i > 0 ? '#3A7D3E' : '#B04040';
    ctx.fillText(fp(i), cx + i * unit, cy + unit / 2 + 2);
  }
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  for (let i = -MAX; i <= MAX; i++) {
    if (i === 0) continue;
    ctx.fillStyle = i > 0 ? '#3A7D3E' : '#B04040';
    ctx.fillText(fp(i), cx + unit / 2 + 3, cy - i * unit);
  }

  // Ground floor
  drawGroundFloor(ctx, shaftX, cy - unit / 2, unit, unit);

  // Sticks + intersection
  const ey = cy - ellie.animPos * unit;
  const wx = cx + walker.animPos * unit;

  if (ellie.pos !== 0 || walker.pos !== 0) {
    ctx.setLineDash([4, 3]);
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#FFD70066';
    ctx.beginPath(); ctx.moveTo(cx, ey); ctx.lineTo(wx, ey); ctx.stroke();
    ctx.strokeStyle = '#EAEAEA66';
    ctx.beginPath(); ctx.moveTo(wx, cy); ctx.lineTo(wx, ey); ctx.stroke();
    ctx.setLineDash([]);

    // Dot
    ctx.fillStyle = '#FF4444';
    ctx.beginPath(); ctx.arc(wx, ey, unit * 0.13, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(9, unit * 0.26)}px Fredoka`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`(${fp(walker.pos)}, ${fp(ellie.pos)})`, wx + unit * 0.18, ey - unit * 0.08);
  }

  // Walker
  drawWalker(ctx, wx, cy + unit * 0.08, unit, walker.stepPhase || 0, walker.lastDir || 1);

  // Elevator car + Ellie
  ctx.fillStyle = '#88888833';
  ctx.fillRect(shaftX + 2, ey - unit / 2 + 2, unit - 4, unit - 4);
  drawEllie(ctx, cx, ey, unit);
}

// ========== INIT ==========
initCanvases();
updateUI(0); updateUI(1); updateUI(2, 'x'); updateUI(2, 'y');
draw();
</script>
